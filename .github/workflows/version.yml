# Release workflow: private package publishing via changesets
#
# Publishes @runfusion/fusion to GitHub Packages by default using GITHUB_TOKEN.

name: Version & Release

# Auto-trigger disabled; workflow preserved for manual use via workflow_dispatch.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Version or Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node-pnpm
        with:
          registry-url: "https://npm.pkg.github.com"
          skip-install: "true"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create Release Pull Request or Publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm release:version
          publish: pnpm --filter @runfusion/fusion publish --registry https://npm.pkg.github.com --no-git-checks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

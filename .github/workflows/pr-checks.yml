name: PR Checks

# The thin trusted merge gate (docs/plans/2026-06-04-001-refactor-fast-trusted-test-gate-plan.md).
# Blocking checks are exactly: Lint, Typecheck, Build, Gate.
#
# BRANCH-PROTECTION CUTOVER: required status checks are matched by job name.
# When this file changes job names, update the repo's branch-protection
# required checks to exactly [Lint, Typecheck, Build, Gate] — a stale required
# name (e.g. "Test shard 1/4") that no longer reports will block every PR
# with "Expected — waiting for status". Open PRs must rebase onto main after
# the cutover so they run this workflow shape.
#
# Everything that used to run here as shards / slow tier / inventory guard is
# non-blocking and lives in full-suite.yml (push to main).

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege token: every job here only reads the repo (checkout + cache).
permissions:
  contents: read

# FN-4863: Opt JavaScript actions into Node 24 ahead of GitHub's forced cutover on 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Lint
        run: pnpm lint

      - name: Changeset format
        run: pnpm check:changesets

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Typecheck
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build

  # The only merge-blocking TEST signal (R3). Runs the boot smoke (the app
  # starts and serves) plus the curated engine-core suite and the CI-shape
  # test — see `test:gate` in the root package.json. Gate membership is the
  # explicit allow-list in packages/engine/vitest.config.ts (engine-core
  # project); a flaky gate test is evicted by removing it from that list.
  gate:
    name: Gate
    runs-on: ubuntu-latest
    # The gate's value is speed; without a job timeout a hung build or
    # deadlocked vitest worker blocks every PR for GitHub's default 6 hours.
    # Expected runtime is ~3-5 min.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      # Dist-artifact cache (same contract as full-suite.yml): exact-match
      # key only, NO restore-keys (stale dist is the known failure mode,
      # FN-4232/FN-4605), NEVER node_modules (breaks Windows pnpm junctions).
      - name: Compute dist source hash
        id: dist-hash
        run: echo "hash=$(node scripts/ensure-test-artifacts.mjs --print-source-hash)" >> "$GITHUB_OUTPUT"

      - name: Cache built dist artifacts
        id: dist-cache
        uses: actions/cache@v4
        with:
          path: |
            packages/core/dist
            packages/dashboard/dist
            packages/engine/dist
            packages/plugin-sdk/dist
            plugins/fusion-plugin-dependency-graph/dist
            plugins/fusion-plugin-hermes-runtime/dist
            plugins/fusion-plugin-openclaw-runtime/dist
            plugins/fusion-plugin-paperclip-runtime/dist
          key: dist-${{ runner.os }}-${{ steps.dist-hash.outputs.hash }}

      - name: Seed artifact hash-cache on cache hit
        if: steps.dist-cache.outputs.cache-hit == 'true'
        run: node scripts/ensure-test-artifacts.mjs --seed-artifact-cache

      # Boot smoke needs the full built workspace (CLI dist is not in the
      # cache list above); cached packages make this incremental-fast.
      - name: Build
        run: pnpm build

      - name: Boot smoke (app starts and serves)
        run: node scripts/boot-smoke.mjs

      - name: Gate tests (curated engine-core + CI-shape)
        run: pnpm test:gate

  # FNXC:CI 2026-07-03-11:10:
  # Desktop packaging validation. electron-builder's production-dependency walk is the ONLY thing that
  # validates the packageable dependency closure, and it historically ran only in workflow_dispatch /
  # release workflows. So a lockfile version skew — e.g. a stale `pnpm.overrides` entry force-holding
  # `@aws-sdk/core` at a version its consumers no longer accepted — sailed through the thin gate and only
  # detonated at release / local installer build time (the exact incident this job prevents). Reproduce
  # that walk on PRs that touch the dependency closure so any future skew fails HERE, for ANY dependency.
  #
  # ADVISORY, not in the required set: the merge gate stays exactly [Lint, Typecheck, Build, Gate] and
  # branch protection is untouched. Promote to merge-blocking by adding "Desktop packaging" to the repo's
  # required checks. Path-gated + electron-builder --dir (skips NSIS/signing) keeps it cheap; the
  # dependency walk that catches skew runs regardless of target platform, so ubuntu suffices.
  desktop-pack:
    name: Desktop packaging
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need history to diff against the PR base for the path gate below.
          fetch-depth: 0

      - name: Detect dependency / desktop-closure changes
        id: changes
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD \
             | grep -qE '^(pnpm-lock\.yaml|package\.json|pnpm-workspace\.yaml|packages/(desktop|dashboard|engine|core)/|plugins/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
            echo "No dependency/desktop-closure changes; skipping the packaging walk."
          fi

      - name: Setup Node.js and pnpm
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/setup-node-pnpm

      # Early-warning (item 3): a lockfile that can still be deduped often signals the version drift that
      # later breaks packaging. Non-fatal — surfaces as a warning so it informs without failing on benign
      # dedupe opportunities.
      - name: Lockfile dedupe check (early warning)
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm dedupe --check || echo "::warning::pnpm dedupe --check found dedupable/inconsistent dependencies; run 'pnpm dedupe' and review."

      - name: Build desktop package (stages the production deploy closure)
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm --filter @fusion/desktop build

      # Authoritative check: electron-builder's production-dependency walk over the staged closure.
      # --dir skips installer/signing but still FAILS if any production dependency's declared version
      # range is unsatisfied in the closure — which is exactly the aws-sdk skew that broke the release.
      - name: Validate packageable closure (electron-builder --dir)
        if: steps.changes.outputs.relevant == 'true'
        run: pnpm --filter @fusion/desktop exec electron-builder --projectDir deploy --dir --publish never
